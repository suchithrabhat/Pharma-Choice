<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>View Drugs</title>

    <link rel="stylesheet" href="category.css">
    <link rel="stylesheet" href="view_drug.css">

</head>

<body>

<header>

    <div class="logo">
        Pharma Choice
    </div>

    <nav id="navbar"></nav>

</header>

<div class="main">

    <h1 class="title">
        Available Drugs
    </h1>

    <div class="filter-container">

        <select id="filterCategory" onchange="renderDrugs()">
            <option value="">All Categories</option>
        </select>

        <input type="text" id="search" placeholder="Search drug" oninput="renderDrugs()">

        <select id="sort" onchange="renderDrugs()">
            <option value="">Sort</option>
            <option value="low">Price Low</option>
            <option value="high">Price High</option>
        </select>

        <button onclick="clearFilters()">
            Clear
        </button>

    </div>

    <div id="drugGrid" class="drug-grid"></div>

</div>

<div id="cartPopup" class="popup">

    <div class="popup-box">

        <h3 id="popupDrugName">Add To Cart</h3>

        <p id="popupStock"></p>

        <input type="number" id="cartQty" min="1" value="1">

        <div class="popup-actions">

            <button onclick="confirmAddToCart()">
                Add
            </button>

            <button class="cancel-btn" onclick="closePopup()">
                Cancel
            </button>

        </div>

    </div>

</div>

<script>

let allDrugs = [];
let selectedDrug = null;

// ================= NAVBAR =================

function loadNavbar(){

    let role = localStorage.getItem("role");
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let nav = document.getElementById("navbar");

    if(role === "Admin"){

        nav.innerHTML = `
            <a href="dashboard.html">Dashboard</a>
            <a href="add_category.html">Add Category</a>
            <a href="view_category.html">View Category</a>
            <a href="add_drug.html">Add Drug</a>
            <a href="view_drug.html" class="active">View Drugs</a>
            <a href="view_orders.html">View Orders</a>
            <a href="index.html" onclick="logout()">Logout</a>
        `;

        return;
    }

    nav.innerHTML = `
        <a href="view_drug.html" class="active">View Drugs</a>
        <a href="my_orders.html">My Orders</a>
        ${
            cart.length > 0
            ?
            `
            <a href="view_cart.html" class="cart-icon">
                Cart
                <span class="cart-count">${cart.length}</span>
            </a>
            `
            : ""
        }
        <a href="index.html" onclick="logout()">Logout</a>
    `;
}

// ================= LOAD DATA =================

async function loadCategories(){

    try{

        let response = await fetch("http://127.0.0.1:5001/categories");
        let categories = await response.json();
        let select = document.getElementById("filterCategory");

        categories.forEach(cat => {
            let option = document.createElement("option");
            option.value = cat.category_name;
            option.textContent = cat.category_name;
            select.appendChild(option);
        });

    } catch(error){
        console.log(error);
    }
}

async function loadDrugs(){

    let grid = document.getElementById("drugGrid");

    try{

        let response = await fetch("http://127.0.0.1:5001/drugs");
        allDrugs = await response.json();

        renderDrugs();

    } catch(error){
        console.log(error);
        grid.innerHTML = "<p class='empty'>Failed to load drugs</p>";
    }
}

// ================= RENDER DRUGS =================

function renderDrugs(){

    let role = localStorage.getItem("role");
    let grid = document.getElementById("drugGrid");
    let category = document.getElementById("filterCategory").value;
    let search = document.getElementById("search").value.toLowerCase();
    let sort = document.getElementById("sort").value;

    let drugs = allDrugs.filter(drug => {
        let matchesCategory = !category || drug.category === category;
        let matchesSearch = drug.name.toLowerCase().includes(search);

        return matchesCategory && matchesSearch;
    });

    if(sort === "low"){
        drugs.sort((a, b) => Number(a.price) - Number(b.price));
    }

    if(sort === "high"){
        drugs.sort((a, b) => Number(b.price) - Number(a.price));
    }

    if(drugs.length === 0){
        grid.innerHTML = "<p class='empty'>No drugs found</p>";
        return;
    }

    grid.innerHTML = "";

    drugs.forEach(drug => {

        let price = Number(drug.price);
        let discount = Number(drug.discount) || 0;
        let stock = Number(drug.stock);
        let finalPrice = price - (price * discount / 100);
        let card = document.createElement("div");

        card.className = "drug-card";

        card.innerHTML = `
            <div>
                <h3>${escapeHTML(drug.name)}</h3>
                <p><strong>Category:</strong> ${escapeHTML(drug.category)}</p>
                <p><strong>Price:</strong> ₹${price.toFixed(2)}</p>
                <p><strong>Discount:</strong> ${discount}%</p>
                <p class="final">Final Price: ₹${finalPrice.toFixed(2)}</p>
                <p class="${stock > 0 ? "stock" : "out-stock"}">
                    ${stock > 0 ? `Stock: ${stock}` : "Out of stock"}
                </p>
            </div>

            <div class="actions">
                ${
                    role === "Admin"
                    ?
                    `
                    <button class="edit-btn" onclick="editDrug(${drug.id})">
                        Update
                    </button>
                    <button class="delete-btn" onclick="deleteDrug(${drug.id})">
                        Delete
                    </button>
                    `
                    :
                    `
                    <button onclick="openCartPopup(${drug.id})" ${stock <= 0 ? "disabled" : ""}>
                        Add To Cart
                    </button>
                    `
                }
            </div>
        `;

        grid.appendChild(card);
    });
}

function clearFilters(){

    document.getElementById("filterCategory").value = "";
    document.getElementById("search").value = "";
    document.getElementById("sort").value = "";

    renderDrugs();
}

// ================= ADMIN ACTIONS =================

function editDrug(id){

    localStorage.setItem("editDrugId", id);
    window.location.href = "add_drug.html";
}

async function deleteDrug(id){

    let confirmDelete = confirm("Are you sure you want to delete this drug?");

    if(!confirmDelete){
        return;
    }

    try{

        let response = await fetch("http://127.0.0.1:5001/delete_drug", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ id: id })
        });

        let data = await response.json();

        alert(data.message || "Drug deleted successfully");

        loadDrugs();

    } catch(error){
        console.log(error);
        alert("Failed To Delete Drug");
    }
}

// ================= USER CART ACTIONS =================

function openCartPopup(id){

    selectedDrug = allDrugs.find(drug => drug.id === id);

    if(!selectedDrug){
        return;
    }

    document.getElementById("popupDrugName").innerText = selectedDrug.name;
    document.getElementById("popupStock").innerText = `Available Stock: ${selectedDrug.stock}`;
    document.getElementById("cartQty").value = 1;
    document.getElementById("cartQty").max = selectedDrug.stock;
    document.getElementById("cartPopup").style.display = "flex";
}

function closePopup(){

    selectedDrug = null;
    document.getElementById("cartPopup").style.display = "none";
}

async function confirmAddToCart(){

    if(!selectedDrug){
        return;
    }

    let qty = Number(document.getElementById("cartQty").value);
    let stock = Number(selectedDrug.stock);

    if(!qty || qty <= 0){
        alert("Enter a valid quantity");
        return;
    }

    if(qty > stock){
        alert("Quantity cannot be more than available stock");
        return;
    }

    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let existingItem = cart.find(item => item.id === selectedDrug.id);
    let price = Number(selectedDrug.price);
    let discount = Number(selectedDrug.discount) || 0;
    let finalPrice = price - (price * discount / 100);

    if(existingItem){
        existingItem.qty += qty;
    } else {
        cart.push({
            id: selectedDrug.id,
            name: selectedDrug.name,
            category: selectedDrug.category,
            price: finalPrice,
            qty: qty
        });
    }

    try{

        await fetch("http://127.0.0.1:5001/reduce_stock", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                id: selectedDrug.id,
                qty: qty
            })
        });

        localStorage.setItem("cart", JSON.stringify(cart));

        alert("Drug added to cart");

        closePopup();
        loadNavbar();
        loadDrugs();

    } catch(error){
        console.log(error);
        alert("Failed To Add Drug To Cart");
    }
}

// ================= UTILITIES =================

function escapeHTML(value){

    return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
    }[char]));
}

function logout(){

    localStorage.removeItem("role");
    localStorage.removeItem("currentUser");
    localStorage.removeItem("email");
}

// ================= PAGE LOAD =================

window.onload = function(){

    let role = localStorage.getItem("role");

    if(role !== "Admin" && role !== "User"){
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    loadNavbar();
    loadCategories();
    loadDrugs();
};

</script>

</body>

</html>
