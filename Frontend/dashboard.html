<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!-- Existing Navbar CSS -->
    <link rel="stylesheet" href="dashboard.css">

    <!-- Dashboard UI CSS -->
    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            padding:0;
            background:linear-gradient(180deg, #fff7ed 0, #f8fafc 270px, #eef2f7 100%);
            color:#111827;
            font-family:'Segoe UI', Arial, Helvetica, sans-serif;
        }

        /* DASHBOARD SECTION */
        .dashboard{
            width:min(100%,1300px);
            padding:44px clamp(16px,4vw,34px);
            margin:0 auto;
        }

        .dashboard h1{
            text-align:left;
            font-size:40px;
            color:#1e293b;
            margin:0 0 28px;
            font-weight:900;
        }

        /* CARDS */
        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            align-items:stretch;
        }

        .card{
            background:#ffffff;
            min-height:150px;
            padding:24px;
            border-radius:8px;
            box-shadow:0 18px 44px rgba(15,23,42,0.13);
            border-top:6px solid #0f766e;
            transition:0.3s ease;
            position:relative;
            overflow:hidden;
            text-align:left;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
        }

        .card::before{
            content:'';
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:5px;
            background:#0f766e;
        }

        .card.alert::before{
            background:#ef4444;
        }

        .card:hover{
            transform:translateY(-6px);
            box-shadow:0 14px 30px rgba(0,0,0,0.12);
        }

        .card h3{
            margin:0 0 18px;
            color:#475569;
            font-size:16px;
            font-weight:900;
        }

        .card p{
            font-size:34px;
            font-weight:bold;
            color:#0f172a;
            margin:0;
            line-height:1.1;
        }

        /* LOW STOCK SECTION */
        #lowStockSection{
            margin-top:32px;
            background:#fff;
            padding:24px;
            border-radius:8px;
            box-shadow:0 18px 44px rgba(15,23,42,0.13);
            border-top:6px solid #f59e0b;
            overflow-x:auto;
        }

        #lowStockSection h2{
            text-align:left;
            margin:0 0 20px;
            color:#111827;
            font-size:26px;
        }

        /* TABLE */
        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            min-width:680px;
        }

        table thead{
            background:#090e1b;
            color:white;
        }

        table th{
            padding:16px;
            text-align:left;
            font-size:14px;
        }

        table td{
            padding:16px;
            background:#fff;
            border-bottom:1px solid #e5e7eb;
            font-size:15px;
            color:#374151;
        }

        table tr:hover td{
            background:#f8fbff;
        }

        /* BUTTON */
        button{
            background:linear-gradient(135deg,#0f766e,#16a34a);
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:8px;
            cursor:pointer;
            font-size:14px;
            font-weight:900;
            box-shadow:0 10px 20px rgba(15,118,110,0.2);
            transition:0.3s ease;
            white-space:nowrap;
        }

        button:hover{
            background:#16a34a;
            transform:scale(1.05);
        }

        /* RESPONSIVE */
        @media(max-width:768px){

            .dashboard{
                padding:30px 16px;
            }

            .dashboard h1{
                font-size:28px;
            }

            .card p{
                font-size:30px;
            }
        }

    </style>
</head>

<body>

<!-- NAVBAR (UNCHANGED) -->
<header>
    <div class="logo">Pharma Choice</div>

    <nav>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="add_category.html">Add Category</a>
        <a href="view_category.html">View Category</a>
        <a href="add_drug.html">Add Drug</a>
        <a href="view_drug.html">View Drugs</a>
        <a href="view_orders.html">View Orders</a>
        <a href="index.html">Logout</a>
    </nav>
</header>

<!-- DASHBOARD -->
<section class="dashboard">

    <h1>Admin Dashboard</h1>

    <!-- CARDS -->
    <div class="cards">

        <div class="card">
            <h3>Total Categories</h3>
            <p id="catCount">0</p>
        </div>

        <div class="card">
            <h3>Total Drugs</h3>
            <p id="drugCount">0</p>
        </div>

        <div class="card">
            <h3>Total Orders</h3>
            <p id="orderCount">0</p>
        </div>

        <div class="card alert">
            <h3>Low Stock Alerts</h3>
            <p id="stockMessage">Checking...</p>
        </div>

    </div>

    <!-- LOW STOCK TABLE -->
    <div id="lowStockSection" style="display:none;">

        <h2>Low Stock Drugs</h2>

        <table>

            <thead>
                <tr>
                    <th>Drug Name</th>
                    <th>Available Stock</th>
                    <th>Last Updated</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="lowStockTable"></tbody>

        </table>

    </div>

</section>

<!-- JAVASCRIPT -->
<!-- ONLY SCRIPT PART UPDATED -->
<script>

function formatLastUpdated(drug){

    let updatedValue = drug.updated || drug.updated_at || drug.last_updated || drug.modified_at || drug.created_at;

    if(!updatedValue){
        return "Not Updated";
    }

    let date = new Date(updatedValue);

    if(Number.isNaN(date.getTime())){
        return updatedValue;
    }

    return date.toLocaleDateString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric"
    });
}

async function loadDashboard() {

    try {

        let drugRes = await fetch("http://127.0.0.1:5001/drugs");
        let drugs = await drugRes.json();

        let catRes = await fetch("http://127.0.0.1:5001/categories");
        let categories = await catRes.json();

        let orderRes = await fetch("http://127.0.0.1:5001/orders");
        let orders = await orderRes.json();

        document.getElementById("drugCount").innerText = drugs.length;
        document.getElementById("catCount").innerText = categories.length;
        document.getElementById("orderCount").innerText = orders.length;

        let lowStock = drugs.filter(d => Number(d.stock) < 10);

        if(lowStock.length === 0){

            document.getElementById("stockMessage").innerText = "All Stocks Good";
            document.getElementById("lowStockSection").style.display = "none";

        } else {

            document.getElementById("stockMessage").innerText = lowStock.length + " Low Stocks";
            document.getElementById("lowStockSection").style.display = "block";

            let tbody = document.getElementById("lowStockTable");
            tbody.innerHTML = "";

            lowStock.forEach((drug, index) => {

                tbody.innerHTML += `
                    <tr>
                        <td>${drug.name}</td>
                        <td>${drug.stock}</td>
                        <td>${formatLastUpdated(drug)}</td>
                        <td>
                            <button onclick="restock(${drug.id})">
                                Restock Now
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

    } catch (error) {
        console.log("Dashboard Error:", error);
    }
}

function restock(drugId){

    fetch("http://127.0.0.1:5001/drugs")
    .then(res => res.json())
    .then(drugs => {

        let selectedDrug = drugs.find(d => d.id === drugId);

        localStorage.setItem("editDrugId", selectedDrug.id);

        window.location.href = "add_drug.html";
    });
}

window.onload = function(){
    loadDashboard();
};

</script>
</body>
</html>
