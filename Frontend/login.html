<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pharma Choice</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

<!-- NAVBAR -->
<header>
    <div class="logo">Pharma Choice</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="login.html" class="active">Login</a>
        <a href="register.html">Register</a>
    </nav>
</header>

<!-- LOGIN FORM -->
<div class="login-container">
    <div class="login-box">

        <h2>Login</h2>

        <form onsubmit="handleLogin(event)">

            <label>Login Type</label>
            <select id="role" required>
                <option value="">Select</option>
                <option value="Admin">Admin</option>
                <option value="User">User</option>
            </select>

            <label>Email</label>
            <input type="email" id="email" placeholder="Enter email" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <button type="submit">Login</button>

        </form>

    </div>
</div>

<!-- JAVASCRIPT -->
<script>

async function handleLogin(event) {
    event.preventDefault();

    let role = document.getElementById("role").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if (!role || !email || !password) {
        alert("Please fill all fields");
        return;
    }

    // ================= ADMIN LOGIN =================
    if (role === "Admin") {

        if (email === "admin@gmail.com" && password === "admin123") {

            localStorage.setItem("role", "Admin");
            localStorage.setItem("email", email); // optional

            alert("Admin Login Successful");

            window.location.href = "dashboard.html";
        } else {
            alert("Invalid Admin Login");
        }

        return;
    }

    // ================= USER LOGIN =================
    try {

        let response = await fetch("http://127.0.0.1:5001/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        let data = await response.json();

        if (data.success) {

            // Store full user object
            localStorage.setItem("currentUser", JSON.stringify(data.user));

            // ✅ IMPORTANT: store email separately for orders filtering
            localStorage.setItem("email", data.user.email);

            // Store role
            localStorage.setItem("role", "User");

            alert("Login Successful");

            window.location.href = "view_drug.html";

        } else {
            alert("Invalid User Credentials");
        }

    } catch (error) {
        console.log(error);
        alert("Login Failed");
    }
}

</script>

</body>
</html>
