<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Add Drug
    </title>

    <link rel="stylesheet" href="add_drug.css">

</head>

<body>

<header>

    <div class="logo">
        Pharma Choice
    </div>

    <nav>

        <a href="dashboard.html">
            Dashboard
        </a>

        <a href="add_category.html">
            Add Category
        </a>

        <a href="view_category.html">
            View Category
        </a>

        <a href="add_drug.html" class="active">
            Add Drug
        </a>

        <a href="view_drug.html">
            View Drugs
        </a>

        <a href="view_orders.html">
            View Orders
        </a>

        <a href="index.html">
            Logout
        </a>

    </nav>

</header>

<div class="container">

    <div class="box">

        <h2 id="formTitle">
            Add New Drug
        </h2>

        <input type="text" id="drugName" placeholder="Drug Name">

        <select id="categorySelect">
            <option value="">
                Select Category
            </option>
        </select>

        <input type="number" id="price" placeholder="Price">

        <input type="number" id="discount" placeholder="Discount (%)">

        <input type="number" id="stock" placeholder="Available Stock">

        <button onclick="saveDrug()" id="submitBtn">
            Save Drug
        </button>

        <p id="message"></p>

    </div>

</div>

<script>

let editDrugId = null;

// LOAD CATEGORIES
async function loadCategories(){

    try{

        let response = await fetch("http://127.0.0.1:5001/categories");
        let categories = await response.json();

        let select = document.getElementById("categorySelect");

        categories.forEach(cat => {

            let option = document.createElement("option");
            option.value = cat.category_name;
            option.textContent = cat.category_name;

            select.appendChild(option);
        });
    }
    catch(error){
        console.log(error);
        alert("Failed To Load Categories");
    }
}

// CHECK EDIT MODE
async function checkEditMode(){

    editDrugId = localStorage.getItem("editDrugId");

    if(editDrugId){

        document.getElementById("formTitle").innerText = "Update Drug";
        document.getElementById("submitBtn").innerText = "Update Drug";

        try{

            let res = await fetch("http://127.0.0.1:5001/drugs");
            let drugs = await res.json();

            let drug = drugs.find(d => d.id == editDrugId);

            if(drug){

                document.getElementById("drugName").value = drug.name;
                document.getElementById("price").value = drug.price;
                document.getElementById("discount").value = drug.discount;
                document.getElementById("stock").value = drug.stock;

                setTimeout(() => {
                    document.getElementById("categorySelect").value = drug.category;
                }, 300);
            }

        } catch(err){
            console.log(err);
        }
    }
}

// SAVE OR UPDATE DRUG
async function saveDrug(){

    let name = document.getElementById("drugName").value;
    let category = document.getElementById("categorySelect").value;
    let price = document.getElementById("price").value;
    let discount = document.getElementById("discount").value;
    let stock = document.getElementById("stock").value;

    if(!name || !category || !price || !stock){
        alert("Please fill all required fields");
        return;
    }

    let drugData = {
        name,
        category,
        price,
        discount,
        stock
    };

    try{

        let url = "http://127.0.0.1:5001/add_drug";
        let method = "POST";

        if(editDrugId){
            url = `http://127.0.0.1:5001/update_drug/${editDrugId}`;
            method = "PUT";
        }

        let response = await fetch(url, {
            method: method,
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(drugData)
        });

        let data = await response.json();

        document.getElementById("message").innerText = data.message;

        localStorage.removeItem("editDrugId");

        resetForm();

        // setTimeout(() => {
        //     window.location.href = "dashboard.html";
        // }, 1000);

    } catch(error){
        console.log(error);
        alert("Failed To Save Drug");
    }
}

// RESET FORM
function resetForm(){

    document.getElementById("drugName").value = "";
    document.getElementById("price").value = "";
    document.getElementById("discount").value = "";
    document.getElementById("stock").value = "";
    document.getElementById("categorySelect").value = "";
}

// INIT
window.onload = function(){
    loadCategories();
    checkEditMode();
};

</script>

</body>
</html>
